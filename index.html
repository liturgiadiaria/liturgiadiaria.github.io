<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Músicas para Missa | Calendário Litúrgico</title>
    <style>
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f8fafc;
            color: #1e293b;
        }

        .calendario-container {
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            max-width: 750px;
            margin: 30px auto;
        }

        .calendario-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .calendario-header h2 {
            margin: 0;
            font-size: 2rem;
            color: #1e3a8a;
            font-weight: 600;
        }

        .calendario-header h2 span {
            color: #dfad43;
        }

        .seta-btn {
            background: #e2e8f0;
            border: none;
            font-size: 1.5rem;
            color: #1e3a8a;
            cursor: pointer;
            padding: 5px 15px;
            border-radius: 8px;
            transition: background 0.2s;
        }

        .seta-btn:hover {
            background: #cbd5e1;
        }

        .calendario-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 12px;
            text-align: center;
        }

        .dia-semana {
            font-weight: 600;
            font-size: 0.85rem;
            color: #64748b;
            text-transform: uppercase;
            padding-bottom: 10px;
            border-bottom: 1px solid #e2e8f0;
        }

        .dia {
            background-color: #e2e8f0;
            color: #334155;
            border-radius: 8px;
            padding: 20px 0;
            font-weight: bold;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .dia:hover:not(.dia-vazio) {
            transform: scale(1.05);
        }

        /* Domingos destacados */
        .domingo {
            background-color: #fffbeb;
            color: #000000;
            border: 1px solid #fef3c7;
        }

        /* Dias fora do mês atual */
        .dia-vazio {
            background-color: transparent;
            color: #cbd5e1;
            font-weight: normal;
            cursor: default;
        }
    </style>
</head>
<body>

<div class="calendario-container">
    <div class="calendario-header">
        <button class="seta-btn" onclick="mudarMes(-1)">&lsaquo;</button>
        <h2 id="mes-ano-titulo">Julho <span>2026</span></h2>
        <button class="seta-btn" onclick="mudarMes(1)">&rsaquo;</button>
    </div>

    <div class="calendario-grid" id="calendario-dias">
        <!-- Os dias vão aparecer aqui dentro via JavaScript -->
    </div>
</div>

<script>
    // Começa mostrando o ano de 2026
    let dataAtual = new Date(2026, 6, 1); // Julho é o mês 6 no JavaScript (0 = Janeiro)

    const nomesMeses = [
        "Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho",
        "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"
    ];

    function renderizarCalendario() {
        const ano = dataAtual.getFullYear();
        const mes = dataAtual.getMonth();

        // Atualiza o título no topo
        document.getElementById("mes-ano-titulo").innerHTML = `${nomesMeses[mes]} <span>${ano}</span>`;

        const grid = document.getElementById("calendario-dias");
        grid.innerHTML = ""; // Limpa o calendário anterior

        // Recria os cabeçalhos dos dias da semana
        const diasSemana = ["Dom", "Seg", "Ter", "Qua", "Qui", "Sex", "Sáb"];
        diasSemana.forEach(dia => {
            const div = document.createElement("div");
            div.className = "dia-semana";
            div.innerText = dia;
            grid.appendChild(div);
        });

        // Descobre em qual dia da semana o mês começa e quantos dias ele tem
        const primeiroDiaSemana = new Date(ano, mes, 1).getDay();
        const totalDiasMes = new Date(ano, mes + 1, 0).getDate();
        
        // Pega quantos dias tinha o mês anterior para preencher o início
        const totalDiasMesAnterior = new Date(ano, mes, 0).getDate();

        // 1. Preenche os dias que sobraram do mês anterior (ficam clarinhos)
        for (let i = primeiroDiaSemana - 1; i >= 0; i--) {
            const div = document.createElement("div");
            div.className = "dia dia-vazio";
            div.innerText = totalDiasMesAnterior - i;
            grid.appendChild(div);
        }

        // 2. Preenche os dias do mês atual
        for (let dia = 1; dia <= totalDiasMes; dia++) {
            const div = document.createElement("div");
            div.className = "dia";
            div.innerText = dia;

            // Descobre o dia da semana atual para ver se é domingo
            const dataDia = new Date(ano, mes, dia);
            if (dataDia.getDay() === 0) {
                div.classList.add("domingo"); // Aplica o amarelinho se for Domingo
            }

            grid.appendChild(div);
        }

        // 3. Preenche os dias do próximo mês para completar a grade visual
        const totalElementos = grid.children.length - 7; // Desconta a linha de cabeçalho
        const diasRestantes = 42 - totalElementos; // Garante uma grade perfeita de 6 linhas
        for (let dia = 1; dia <= diasRestantes; dia++) {
            const div = document.createElement("div");
            div.className = "dia dia-vazio";
            div.innerText = dia;
            grid.appendChild(div);
        }
    }

    // Função que roda quando clica nas setinhas
    function mudarMes(direcao) {
        dataAtual.setMonth(dataAtual.getMonth() + direcao);
        renderizarCalendario();
    }

    // Inicializa o calendário na tela
    renderizarCalendario();
</script>

</body>
</html>
